name: Flamegraph Upload
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  flamegraph-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.24.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - shell: bash
        run: |
          pnpm install --no-frozen-lockfile

      - shell: bash
        run: |
          pnpm run flamegraph

      - name: Upload flamegraph profile
        uses: actions/upload-artifact@v4
        with:
          name: flamegraph-profile
          path: flamegraph.pprof
          if-no-files-found: error
