name: Documentation
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.24.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - uses: actions/configure-pages@v5

      - run: pnpm install --frozen-lockfile

      - name: Build documentation
        run: |
          pnpm build:examples
          pnpm run docs
          mkdir -p ./docs/examples
          cp -r ./examples/chat/dist ./docs/examples/chat
          find ./docs/examples -type f -name 'index.html' -exec sed -i 's|src="/assets/|src="assets/|g' {} +
          find ./docs/examples -type f -name 'index.html' -exec sed -i 's|href="/assets/|href="assets/|g' {} +

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    name: Deploy documentation
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
