name: Documentation
on:
  push:
    branches: [main, codex/validate-canvas-chat]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PAGES_BASE_PATH: /${{ github.event.repository.name }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.24.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - uses: actions/configure-pages@v5

      - run: pnpm install --frozen-lockfile

      - name: Build documentation and public examples
        env:
          VITE_BOOTSTRAP_PEERS: ""
          VITE_NETWORK_MODE: modular
          VITE_NOSTR_RELAYS: wss://nos.lol,wss://relay.damus.io
          VITE_RENDEZVOUS_ENDPOINTS: ""
          VITE_ROUTING_ENDPOINTS: https://delegated-ipfs.dev/,https://cid.contact/
        run: |
          pnpm run docs
          VITE_BASE_PATH="${PAGES_BASE_PATH}/examples/grid/" \
            VITE_MEMBERSHIP_INVITE=ts-drp-pages-grid-public-demo-v1 \
            VITE_RENDEZVOUS_NAMESPACE=drp-network:v1:dHMtZHJwLXBhZ2VzLWdyaWQtdjE \
            pnpm --filter ts-drp-example-grid build
          VITE_BASE_PATH="${PAGES_BASE_PATH}/examples/canvas/" \
            VITE_MEMBERSHIP_INVITE=ts-drp-pages-canvas-public-demo-v1 \
            VITE_RENDEZVOUS_NAMESPACE=drp-network:v1:dHMtZHJwLXBhZ2VzLWNhbnZhcy12MQ \
            pnpm --filter ts-drp-examples-canvas build
          VITE_BASE_PATH="${PAGES_BASE_PATH}/examples/chat/" \
            VITE_MEMBERSHIP_INVITE=ts-drp-pages-chat-public-demo-v1 \
            VITE_RENDEZVOUS_NAMESPACE=drp-network:v1:dHMtZHJwLXBhZ2VzLWNoYXQtdjE \
            pnpm --filter ts-drp-example-chat build
          mkdir -p ./docs/examples
          cp ./site/examples/index.html ./docs/examples/index.html
          cp ./site/examples/styles.css ./docs/examples/styles.css
          cp -r ./examples/grid/dist ./docs/examples/grid
          cp -r ./examples/canvas/dist ./docs/examples/canvas
          cp -r ./examples/chat/dist ./docs/examples/chat

      - name: Verify Pages artifact
        run: |
          test -f ./docs/examples/index.html
          test -f ./docs/examples/styles.css
          for example in grid canvas chat; do
            test -f "./docs/examples/${example}/index.html"
            grep -q "${PAGES_BASE_PATH}/examples/${example}/assets/" "./docs/examples/${example}/index.html"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./docs

  deploy:
    name: Deploy documentation
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
